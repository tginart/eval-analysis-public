figs:
  wrangle_logistic:
    headline: &wrangle_headline
      runs_file: &runs_file data/raw/runs.jsonl
      additional_runs_dep: data/raw/runs.jsonl
      weighting: invsqrt_task_weight
      categories: ftr
      regularization: 0.00001
      exclude: []
      success_percents: [50, 80]
      confidence_level: 0.95

    ga_rebench:
      <<: *wrangle_headline
      exclude: ["SWAA"]
      success_percents: [50]

  plot_bar_chart_weighted_scores:
    focus_agents: *default_agents
    weighting: "invsqrt_task_weight"
    exclude: []

  plot_bar_chart:
    bar_chart_agents_ordered:
      - GPT-5.2
      - Claude Opus 4.5 (Inspect)
      - Gemini 3 Pro
      - Claude 4.1 Opus (Inspect)
      - Claude 4 Opus (Inspect)
      - Claude 3.7 Sonnet (Inspect)
      - Claude 3.5 Sonnet (New) (Inspect)
      - Claude 3.5 Sonnet (Old) (Inspect)
      - Claude 3 Opus (Inspect)
      - GPT-4o (Inspect)
      - GPT-4 Turbo (Inspect)
      - GPT-4 1106 (Inspect)
      - o1 (Inspect)
      - o3 (Inspect)
      - GPT-5 (Inspect)

    bar_chart_highlight_agent: "GPT-5 (Inspect)" # "Claude 3.7 Sonnet"

  plot_individual_histograms:
    default: &default_histogram
      annotate_p50: true
      logistic_file: "data/wrangled/logistic_fits/headline.csv"
      runs_file: *runs_file
      additional_runs_dep: *runs_file
      weighting: "invsqrt_task_weight"
      title: "Success probabilities at different task lengths on 1.1 task suite"
      n_subplot_cols: 3
      horizontal_lines:
        - p_success: 0.5
          styling:
            color: "firebrick"
            linestyle: "dashed"
            linewidth: 1.8
            alpha: 0.7
      x_lim_start: "2022-12-01"
      x_lim_end: "2025-04-01"
      lower_y_lim: 0
      upper_y_lim: 1
      exclude: []
      include_agents: *default_agents

    overlaid:
      <<: *default_histogram
      n_subplot_cols: 1
      title: "Models are succeeding at increasingly long tasks"
      include_agents:
        - GPT-5 (Inspect)
      annotate_p50: false
      type: "overlaid"

    scatter_default:
      <<: *default_histogram
      display_mode: "scatter"
      title: "Task-level success rates vs task length"
      point_size_scale: 100
      alpha: 0.5

  plot_logistic_regression:
    headline: &plot_headline
      <<: *wrangle_headline
      logistic_file: headline
      trendlines:
        - fit_type: exponential
          caption: null
          after_date: "2023-01-01"
          color: blue
          line_start_date: "2022-01-01"
          line_end_date: "2027-06-01"
          display_r_squared: true
          styling: null
          data_file: null
          skip_annotation: false
      include_task_distribution: none
      individual_labels: true
      x_lim_start: "2022-11-01"
      x_lim_end: "2026-07-01"
      lower_y_lim: 0.0083333 # 0.5 seconds
      upper_y_lim: 1920
      linear_overrides:
        show_minor_xticks: false
        lower_y_lim: 0
        plot_style_overrides:
          scatter_styling:
            error_bar:
              alpha: 0.5
              capsize: 0
      exclude_agents: *exclude_agents
      exclude_agents_from_all_fits: *exclude_agents_from_all_fits
      title: "Length of tasks AI agents have been able to complete autonomously"
      subtitle: "for 228 software engineering, cybersecurity, general reasoning, and ML tasks"
      rename_legend_labels:
        "davinci-002 (GPT-3) (Inspect)": "GPT 3"
        "gpt-3.5-turbo-instruct (Inspect)": "GPT 3.5"
        "GPT-4o (Inspect)": "GPT 4o"
        "GPT-4 0314": "GPT-4"
        "o1-preview": "o1-preview"
        "Claude 4 Opus (Inspect)": "Opus 4 (Inspect)"
        "Claude 4.1 Opus (Inspect)": "Opus 4.1 (Inspect)"
        "Claude Opus 4.6 (Inspect)": "Opus 4.6 (Inspect)"
        "Claude 3.7 Sonnet (Inspect)": "Sonnet 3.7 (Inspect)"
        "Claude 3.5 Sonnet (New) (Inspect)": "Sonnet 3.6 (Inspect)"
        "Claude 3.5 Sonnet (Old) (Inspect)": "Sonnet 3.5 (Inspect)"
        "Claude 3 Opus (Inspect)": "Opus 3 (Inspect)"
        "o3 (Inspect)": "o3"
        "o1 (Inspect)": "o1"
        "o1-preview (Inspect)": "o1 preview"
        "GPT-5 (Inspect)": "GPT 5"
        "GPT-4 Turbo (Inspect)": "GPT 4 Turbo"
        "GPT-4 1106 (Inspect)": "GPT 4 Nov '23"
        "GPT-2 (Inspect)": "GPT 2"
        "GPT-5.1-Codex-Max (Inspect)": "GPT-5.1-Codex-Max"
        "Claude Opus 4.5 (Inspect)": "Claude Opus 4.5"
        "GPT-5.2": "GPT-5.2 (high)"
      show_y_label: true
    twitter_headline: &twitter_headline_config
      <<: *plot_headline
      lower_y_lim: 3 # start at ~3 mins
      upper_y_lim: 1440 # 24 hours
      x_lim_start: "2024-03-29"
      rename_legend_labels:
        "GPT-4o (Inspect)": "GPT 4o"
        "Claude Opus 4.6 (Inspect)": "Claude Opus 4.6"
        "Claude 3.7 Sonnet (Inspect)": "Sonnet 3.7"
        "GPT-5.2": "GPT-5.2 (high)"
      title: "Claude Opus 4.6 has a 50%-time-horizon of about 12 hours (95% CI: 5 hrs to 66 hrs)"
      subtitle: "Task length (at 50% success rate)"
      # Override trendlines to add grey historical reference lines
      # Comment out trendlines 2 or 3 to disable them
      trendlines:
        # Primary trendline (green) - current trend from 2023+
        - fit_type: exponential
          caption: "TH 1.1, 2023-01-01+ data"
          after_date: "2023-01-01"
          color: blue
          line_start_date: "2022-01-01"
          line_end_date: "2027-06-01"
          display_r_squared: true
          styling: null
          data_file: null
          skip_annotation: false
        # Grey: Original paper trend (GPT-2 to Sonnet 3.7, ~212 days)
        # Uses data from time-horizon-1-0 with only SOTA models from original paper
        # Line is solid within data range, dashed outside
        # Comment out this block to disable
        - fit_type: exponential
          after_date: "2019-01-01"
          before_date: "2025-02-25" # Sonnet 3.7 release date (matches original paper)
          color: "#505050" # Dark grey
          line_start_date: "2019-01-01"
          line_end_date: "2027-06-01"
          display_r_squared: false
          skip_annotation: false
          caption: "Trend from Kwa, West, et al. 2025"
          display_after_date: false
          data_file: ../time-horizon-1-0/data/wrangled/logistic_fits/headline.csv
          # Exclude non-SOTA models to match original paper (11 SOTA models)
          exclude_agents:
            - Claude 3 Opus
            - GPT-4 0125
            - GPT-4 Turbo
            - Qwen2-72B
            - Qwen2.5-72B
            - DeepSeek-V3
            - DeepSeek-R1
          styling:
            linewidth: 2.0
      title_location: "left"
      suptitle_location: "left"
      legend_fontsize: 14
      ax_label_fontsize: 14
      title_fontsize: 14
      xlabel: "Model release date"
      ylabel: ""
      show_grid: true
      y_ticks_skip: 2
      hide_regression_info: false
      annotation_fontsize: 20
      legend_frameon: false
      xticks_skip: 1
      show_watermark: true
      show_example_tasks: true
      show_minor_xticks: true
      linear_overrides:
        show_minor_xticks: false
        hide_error_bars: false
        hide_trendline: true
        show_example_tasks: false
        lower_y_lim: 0
        y_ticks_skip: 1
        plot_style_overrides:
          scatter_styling:
            error_bar:
              alpha: 0.5
              capsize: 0
      plot_style_overrides:
        scatter_styling:
          scatter:
            s: 75
        agent_styling:
          "Claude Opus 4.6 (Inspect)":
            lab_color: &metr_pink "#c86592"
            marker: "o"
          "Claude Opus 4.5 (Inspect)":
            lab_color: &metr_green "#2c7c58"
            marker: "o"
          "Claude 4.1 Opus (Inspect)":
            lab_color: &metr_gray "#A0A0A0"
            marker: "o"
          "Claude 4 Opus (Inspect)":
            lab_color: *metr_gray
            marker: "o"
          "o3 (Inspect)":
            lab_color: *metr_green
            marker: "o"
          "Claude 3.7 Sonnet (Inspect)":
            lab_color: *metr_green
            marker: "o"
          "Claude 3.5 Sonnet (New) (Inspect)":
            lab_color: *metr_green
            marker: "o"
          "Claude 3.5 Sonnet (Old) (Inspect)":
            lab_color: *metr_green
            marker: "o"
          "Claude 3 Opus (Inspect)":
            lab_color: *metr_gray
            marker: "o"
          "o1 (Inspect)":
            lab_color: *metr_green
            marker: "o"
          "o1-preview (Inspect)":
            lab_color: *metr_green
            marker: "o"
          "GPT-5 (Inspect)":
            lab_color: *metr_green
            marker: "o"
          "GPT-5.1-Codex-Max (Inspect)":
            lab_color: *metr_green
            marker: "o"
          "GPT-4o (Inspect)":
            lab_color: *metr_green
            marker: "o"
          "GPT-4 Turbo (Inspect)":
            lab_color: *metr_gray
            marker: "o"
          "GPT-4 1106 (Inspect)":
            lab_color: *metr_green
            marker: "o"
          "gpt-3.5-turbo-instruct (Inspect)":
            lab_color: *metr_green
            marker: "o"
          "davinci-002 (GPT-3) (Inspect)":
            lab_color: *metr_green
            marker: "o"
          "GPT-2 (Inspect)":
            lab_color: *metr_green
            marker: "o"
          "GPT-2":
            lab_color: *metr_green
            marker: "o"
          "GPT-4 0314":
            lab_color: *metr_green
            marker: "o"
          "o1-preview":
            lab_color: *metr_green
            marker: "o"
          "human":
            lab_color: "grey"
            marker: "o"
            unique_color: "#858585"
          "Gemini 3 Pro":
            lab_color: *metr_green
            marker: "p"
            unique_color: "#4285F4"
          "GPT-5.2":
            lab_color: *metr_green
            marker: "o"
          "default":
            lab_color: "black"
            marker: "o"
            unique_color: "black"
      individual_labels: true
      label_positions:
        "GPT 4o": [7, -24]
        "Sonnet 3.7": [-8, 24]
        "GPT-5.2 (high)": [7, -28]
        "Claude Opus 4.6": [7, -40]
      show_y_label: false
    p80:
      <<: *plot_headline
      logistic_file: headline
      subtitle: 80% success rate
      success_percent: 80
      trendlines:
        - fit_type: exponential
          caption: null
          after_date: "2020-01-01"
          color: blue
          line_start_date: "2019-09-01"
          line_end_date: "2027-01-01"
          display_r_squared: true
          styling: null
          data_file: null
          skip_annotation: false
        - fit_type: exponential
          caption: null
          after_date: "2020-01-01"
          color: grey
          line_start_date: "2019-09-01"
          line_end_date: "2027-01-01"
          display_r_squared: true
          success_percent: 50
          data_file: null
          skip_annotation: true
          styling:
            linestyle: dashed
      exclude_agents: *exclude_agents
      exclude_agents_from_all_fits: *exclude_agents_from_all_fits
    double_line_all_data_retrodict_excluding_swaa:
      runs_file: *runs_file
      logistic_file: headline
      weighting: invsqrt_task_weight
      include_task_distribution: none
      title: "50% Time Horizon Retrodicted from 2023-2025 Data"

      trendlines:
        - fit_type: exponential
          skip_annotation: false
          caption: Fit on all data
          after_date: "2019-01-01"
          color: black
          line_start_date: "2018-09-03"
          line_end_date: "2025-12-31"
          display_r_squared: false
          data_file: null
          styling:
            linewidth: 2
            alpha: 0.6
            linestyle: solid
          exclude_agents: *exclude_agents
          exclude_agents_from_all_fits: *exclude_agents_from_all_fits
        - fit_type: exponential
          skip_annotation: false
          caption: |-
            Fit on non-SWAA tasks, 2023-2025 models
          after_date: "2023-01-01"
          color: blue
          line_start_date: "2018-09-03"
          line_end_date: "2025-12-31"
          display_r_squared: false
          data_file: data/wrangled/logistic_fits/ga_rebench.csv
          styling:
            linewidth: 2
            alpha: 0.6
            linestyle: solid
      exclude: []
      exclude_agents: *exclude_agents
      exclude_agents_from_all_fits: *exclude_agents_from_all_fits
      lower_y_lim: 0.0083333 # 0.5 seconds
      upper_y_lim: 1920
      x_lim_start: "2018-09-03"
      x_lim_end: "2025-12-31"
      show_y_label: true

  compare_trend:
    exclude_agents: *exclude_agents
    exclude_agents_from_all_fits: *exclude_agents_from_all_fits
    confidence_level: 0.95

  wrangle_score_over_resource_horizon:
    generation_cost:
      x: generation_cost
      wrangle_params: ga_rebench
      score_column: score_binarized
      output: ga_rebench
      include_human_flag: "--include-human"
      exclude_agents: *horizon_exclude_agents_with_human
    tokens_count:
      x: tokens_count
      wrangle_params: ga_rebench
      score_column: score_binarized
      output: ga_rebench_tokens
      include_human_flag: ""
      exclude_agents: *horizon_exclude_agents_with_human

  plot_score_over_resource_horizon:
    linear_cost:
      y_scale: linear
      weighting_column: p50
      score_column: p50
      y_lim_lower: 0
      y_lim_upper: 145
      wrangled: ga_rebench
      output_file: ga_rebench_linear
      x: generation_cost
      exclude_agents: *horizon_exclude_agents_with_human
    log_cost:
      y_scale: log
      weighting_column: p50
      score_column: p50
      y_lim_lower: 0.70
      y_lim_upper: none
      wrangled: ga_rebench
      output_file: ga_rebench_log
      x: generation_cost
      exclude_agents: *horizon_exclude_agents_with_human
    linear_tokens:
      y_scale: linear
      weighting_column: p50
      score_column: p50
      y_lim_lower: 0
      y_lim_upper: 1920
      wrangled: ga_rebench_tokens
      output_file: ga_rebench_tokens_linear
      x: tokens_count
      exclude_agents: *horizon_exclude_agents_with_human
    log_tokens:
      y_scale: log
      weighting_column: p50
      score_column: p50
      y_lim_lower: 0.70
      y_lim_upper: 1920
      wrangled: ga_rebench_tokens
      output_file: ga_rebench_tokens_log
      x: tokens_count
      exclude_agents: *horizon_exclude_agents_with_human