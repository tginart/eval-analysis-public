  - GPT-4o (Inspect)
  - GPT-4 Turbo (Inspect)
  - GPT-4 1106 (Inspect)
  - o1-preview
  - GPT-4 0314
  - Gemini 3 Pro

horizon_exclude_agents_with_human: &horizon_exclude_agents_with_human
  - GPT-4 0125
  - DeepSeek-R1-0528
  - DeepSeek-V3-0324
  - DeepSeek-R1
  - DeepSeek-V3
  - Qwen2.5-72B
  - Qwen2-72B
  - o4-mini
  - Claude Sonnet 4.5
  - Claude 4.1 Opus
  - Claude 4 Opus
  - Claude 4 Sonnet
  - Claude 3 Opus
  - GPT-4 Turbo
  - Claude 3.5 Sonnet (Old)
  - GPT-2
  - davinci-002 (GPT-3)
  - GPT-4 1106
  - gpt-3.5-turbo-instruct
  - GPT-4 0314
  - human
  - o3 (Inspect)
  - Claude 4 Opus (Inspect)
  - Claude 4.1 Opus (Inspect)
  - Claude 3.7 Sonnet (Inspect)
  - o1 (Inspect)
  - o1-preview
  - Claude 3.5 Sonnet (New) (Inspect)
  - Claude 3.5 Sonnet (Old) (Inspect)
  - GPT-4o (Inspect)
  - GPT-4 1106 (Inspect)
  - GPT-4 Turbo (Inspect)
